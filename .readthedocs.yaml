version: 2

submodules:
  include: all

build:
  os: ubuntu-22.04
  apt_packages:
    - fonts-liberation
    - cmake
    - doxygen
  tools:
    python: "3.11"

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

sphinx:
  builder: dirhtml
  configuration: docs/conf.py
  # fail_on_warning: true
